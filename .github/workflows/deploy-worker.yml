name: Deploy CCDOS Worker

on:
  push:
    branches: [main]
    # 배포 산출물이나 게이트 검증에 영향을 주는 경로에서만 배포한다. 문서성 변경은 public-content-gate만 통과하면 된다.
    paths:
      - "site/**"
      - "content/**"
      - "vaults/**"
      - "automation/**"
      - "scripts/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Lint Python automation code
        run: |
          pip install "ruff==0.15.21"
          ruff check
      - name: Verify architecture boundaries
        run: python scripts/verify_phase0.py
      - name: Validate public note metadata and privacy rules
        run: python automation/validate_notes.py vaults/CORCOIDUM-Public
      - name: Require current approved-content index
        run: python automation/build_public_content.py --check
      - name: Require current approved public graph
        run: python automation/build_public_graph.py --check
      - name: Run automation tests
        run: python -m unittest discover -s tests -v
      - name: Install website dependencies
        working-directory: site
        run: npm ci
      - name: Typecheck website and Worker
        working-directory: site
        run: npm run typecheck
      - name: Install Playwright browser
        working-directory: site
        run: npx playwright install --with-deps chromium
      - name: Run frontend smoke tests
        working-directory: site
        run: npm test
      - name: Deploy static assets to Cloudflare Worker
        id: deploy
        working-directory: site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: npm run deploy
      - name: Create redacted deployment status
        if: ${{ always() }}
        env:
          DEPLOYMENT_STATUS: ${{ steps.deploy.outcome || 'skipped' }}
        run: >-
          python automation/create_status_report.py
          --deployment-status "$DEPLOYMENT_STATUS"
          --output "$RUNNER_TEMP/ccdos-status.json"
      - name: Send optional Discord deployment status
        if: ${{ always() }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "SKIP: DISCORD_WEBHOOK_URL is not configured"
            exit 0
          fi
          python automation/notify_discord.py --report "$RUNNER_TEMP/ccdos-status.json" --send
